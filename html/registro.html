<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoSmart - Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-screen">
    <section class="auth-card wide">
      <a class="auth-back" href="../index.html">Volver al inicio</a>
      <h1>Crear cuenta</h1>
      <p>Registra tus datos y la informacion basica de tu motocicleta.</p>
      <div class="data-notice">
        <div class="notice-icon">i</div>
        <p>
          Tratamiento de datos: la informacion ingresada se usa solo con fines educativos
          dentro de este proyecto academico desarrollado por estudiantes.
        </p>
      </div>

      <form id="registerForm">
        <div>
          <label>Nombre completo</label>
          <input name="nombre" type="text" placeholder="Juan Perez" autocomplete="name" required>
        </div>
        <div>
          <label>Correo electronico</label>
          <input name="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email" required>
        </div>
        <div>
          <label>Contrasena</label>
          <input name="password" type="password" placeholder="********" autocomplete="new-password" minlength="6" required>
        </div>
        <div>
          <label>Confirmar contrasena</label>
          <input name="confirmPassword" type="password" placeholder="********" autocomplete="new-password" minlength="6" required>
        </div>
        <div>
          <label>Marca de moto</label>
          <select name="marca">
            <option>Yamaha</option>
            <option>Honda</option>
            <option>Suzuki</option>
            <option>Bajaj</option>
            <option>KTM</option>
            <option>AKT</option>
            <option>Otra</option>
          </select>
        </div>
        <div>
          <label>Modelo</label>
          <input name="modelo" type="text" placeholder="FZ 2.0">
        </div>
        <div>
          <label>Ano</label>
          <input name="anio" type="number" placeholder="2023" min="1900" max="2100">
        </div>
        <div>
          <label>Kilometraje actual</label>
          <input name="kilometraje" type="number" placeholder="12000" min="0">
        </div>
        <button class="btn" type="submit">Registrarme</button>
        <p id="registerMessage" class="form-message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
