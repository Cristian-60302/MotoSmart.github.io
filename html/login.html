<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoSmart - Iniciar sesion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-screen">
    <section class="auth-card">
      <a class="auth-back" href="../index.html">Volver al inicio</a>
      <h1>Iniciar sesion</h1>
      <p>Ingresa con el correo y la contrasena registrados.</p>

      <form id="loginForm">
        <div>
          <label>Correo electronico</label>
          <input name="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email" required>
        </div>
        <div>
          <label>Contrasena</label>
          <input name="password" type="password" placeholder="********" autocomplete="current-password" required>
        </div>
        <button class="btn" type="submit">Ingresar</button>
        <p id="loginMessage" class="form-message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
